name: CI - Retrain Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('/04_Deployment/retrain_image/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # requirements.txt is in 04_Deployement/retrain_image/ (relative to repo root = citibike_prediction/)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r /04_Deployment/retrain_image/requirements.txt
          pip install pytest pytest-mock

      # pytest.ini and tests/ are at repo root — no working-directory needed
      # PYTHONPATH points to 04_Deployement/retrain_image/ so retrain.py is importable
      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}/04_Deployement/retrain_image
        run: |
          pytest tests/test_retrain.py -v --tb=short

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: .pytest_cache/